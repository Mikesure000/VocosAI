services:
  - type: web
    name: vocosai-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/app/data/vocosai.sqlite
      - key: JWT_SECRET
        sync: false
      - key: VOCOS_MODEL_MODE
        value: mock
      - key: VOCOS_PRIMARY_PROVIDER
        value: deepseek
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
