# VocosAI Backend Docker Compose
version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8787:8787"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/vocosai.sqlite
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
    restart: unless-stopped
